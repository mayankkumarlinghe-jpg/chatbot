<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chatbot Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
    }

    /* Floating chat button */
    #chat-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #4CAF50;
      color: white;
      border: none;
      padding: 15px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
    }

    /* Chat container */
    #chatbox {
      position: fixed;
      bottom: 80px;
      right: 20px;
      width: 300px;
      height: 400px;
      background: white;
      border: 1px solid #ccc;
      border-radius: 10px;
      display: none;
      flex-direction: column;
    }

    #messages {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
    }

    .msg {
      margin: 5px 0;
    }

    .user {
      text-align: right;
      color: blue;
    }

    .bot {
      text-align: left;
      color: green;
    }

    #input-area {
      display: flex;
      border-top: 1px solid #ccc;
    }

    #input {
      flex: 1;
      padding: 10px;
      border: none;
    }

    button.send {
      padding: 10px;
      border: none;
      background: #4CAF50;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>

<button id="chat-btn">💬</button>

<div id="chatbox">
  <div id="messages"></div>

  <div id="input-area">
    <input id="input" placeholder="Type a message..." />
    <button class="send" onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
  const apiUrl = "https://chatbot-yxdb.onrender.com/chat";

  const chatBtn = document.getElementById("chat-btn");
  const chatbox = document.getElementById("chatbox");
  const messages = document.getElementById("messages");

  chatBtn.onclick = () => {
    chatbox.style.display =
      chatbox.style.display === "flex" ? "none" : "flex";
  };

  async function sendMessage() {
    const input = document.getElementById("input");
    const text = input.value;
    if (!text) return;

    messages.innerHTML += `<div class="msg user">${text}</div>`;
    input.value = "";

    try {
      const res = await fetch(apiUrl, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ message: text })
      });

      const data = await res.json();

      messages.innerHTML += `<div class="msg bot">${data.reply || "No response"}</div>`;
      messages.scrollTop = messages.scrollHeight;

    } catch (err) {
      messages.innerHTML += `<div class="msg bot">Error connecting server</div>`;
    }
  }
</script>

</body>
</html>
