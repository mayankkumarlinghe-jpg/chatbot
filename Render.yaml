services:
  - type: web
    name: chatbot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MODEL_NAME
        sync: false
      - key: EMBED_MODEL
        sync: false
      - key: MAX_TOKENS
        value: "200"
      - key: RATE_LIMIT
        value: "5/minute"
      - key: ALLOWED_ORIGINS
        sync: false
      - key: HF_TOKEN
        sync: false
